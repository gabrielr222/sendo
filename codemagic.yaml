workflows:
  capacitor-android:
    name: Build Sendo Android AAB

    instance_type: mac_mini_m1
    max_build_duration: 60

    environment:
      node: latest
      java: 21

      vars:
        CM_VERSION_CODE: "77"
        CM_VERSION_NAME: "1.3"

      android_signing:
        - sendo-key

    triggering:
      events:
        - push

      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps

      - name: Create dummy web assets
        script: |
          mkdir -p dist
          echo "<html><body>Sendo</body></html>" > dist/index.html

      - name: Sync Capacitor Android
        script: |
          npx cap sync android

      - name: Update Android version
        script: |
          cd android
          sed -i.bak "s/versionCode [0-9]*/versionCode $CM_VERSION_CODE/" app/build.gradle
          sed -i.bak 's/versionName "[^"]*"/versionName "'"$CM_VERSION_NAME"'"/' app/build.gradle

      - name: Inject signing config
        script: |
          cat >> android/app/build.gradle <<EOF

          android {
              signingConfigs {
                  release {
                      storeFile file(System.getenv("CM_KEYSTORE_PATH"))
                      storePassword System.getenv("CM_KEYSTORE_PASSWORD")
                      keyAlias System.getenv("CM_KEY_ALIAS")
                      keyPassword System.getenv("CM_KEY_PASSWORD")
                  }
              }

              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          EOF

      - name: Build Signed AAB
        script: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

    artifacts:
      - android/app/build/outputs/**/*.aab

  capacitor-ios:
    name: Build Sendo iOS IPA

    instance_type: mac_mini_m1
    max_build_duration: 60

    environment:
      node: latest
      xcode: latest

      vars:
        BUNDLE_ID: "app.sendo.delivery"

      ios_signing: