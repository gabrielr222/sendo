workflows:
  capacitor-android:
    name: Build Sendo Android (Capacitor)

    instance_type: mac_mini_m1
    max_build_duration: 60

    environment:
      node: latest
      java: 17

    triggering:
      events:
        - push

      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install PNPM
        script: |
          npm install -g pnpm --force

      - name: Install dependencies
        script: |
          pnpm install

      - name: Build web app
        script: |
          pnpm run build

      - name: Sync Capacitor
        script: |
          pnpm exec cap sync android

      - name: Build APK
        script: |
          cd android
          ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/**/*.apk