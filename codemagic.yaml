workflows:
  capacitor-android:
    name: Build Sendo Android (Capacitor)
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      node: latest
      java: 17
      groups:
        - sendo
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
    scripts:
      - name: Install PNPM
        script: |
          npm install -g pnpm --force
      - name: Install dependencies
        script: |
          pnpm install --ignore-scripts
      - name: Sync Capacitor
        script: |
          pnpm exec cap sync android
      - name: Set up code signing
        script: |
          # Reconstruye el archivo de claves .p12 desde la variable Base64 de Floot
          echo $CM_KEYSTORE | base64 --decode > /tmp/sendo-upload-keystore.p12
          
          # Inyecta dinámicamente las credenciales en el archivo local.properties de Android
          cat >> android/local.properties <<EOF
          release.keystore=/tmp/sendo-upload-keystore.p12
          release.keystore.password=$CM_KEYSTORE_PASSWORD
          release.key.alias=$CM_KEY_ALIAS
          release.key.password=$CM_KEY_PASSWORD
          EOF
      - name: Build APK (Android Release)
        script: |
          cd android && ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/**/*.apk