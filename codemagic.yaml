workflows:
  capacitor-android:
    name: Build Sendo Android

    instance_type: mac_mini_m1
    max_build_duration: 60

    environment:
      java: 17

    triggering:
      events:
        - push

      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/**/*.apk