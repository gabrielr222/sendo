workflows:
  capacitor-android:
    name: Build Sendo Android (Capacitor)
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      node: latest
      java: 17
      groups:
        - sendo
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
    scripts:
      - name: Install PNPM
        script: |
          npm install -g pnpm --force
      - name: Install dependencies
        script: |
          pnpm install --ignore-scripts
      - name: Sync Capacitor
        script: |
          pnpm exec cap sync android
      - name: Set up code signing
        script: |
          echo "$CM_KEYSTORE" | base64 --decode > /tmp/sendo-upload-keystore.p12

          # Inyectar signing config en build.gradle
          cat << 'SIGNING' >> android/app/build.gradle

          android.signingConfigs {
              release {
                  storeFile file("/tmp/sendo-upload-keystore.p12")
                  storePassword System.getenv("CM_KEYSTORE_PASSWORD")
                  keyAlias System.getenv("CM_KEY_ALIAS")
                  keyPassword System.getenv("CM_KEY_PASSWORD")
              }
          }
          android.buildTypes.release.signingConfig android.signingConfigs.release
          SIGNING
      - name: Build APK (Android Release)
        script: |
          cd android && ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/**/*.apk