workflows:
  capacitor-android:
    name: Build Sendo Android

    instance_type: mac_mini_m1
    max_build_duration: 60

    environment:
      node: latest
      java: 21

    triggering:
      events:
        - push

      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps

      - name: Create dummy web assets
        script: |
          mkdir -p dist
          echo "<html><body>Sendo</body></html>" > dist/index.html

      - name: Sync Capacitor
        script: |
          npx cap sync android

      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/**/*.apk