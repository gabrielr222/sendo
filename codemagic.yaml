workflows:
  capacitor-android:
    name: Build Sendo Android AAB

    instance_type: mac_mini_m1
    max_build_duration: 60

    environment:
      node: latest
      java: 21

      vars:
        CM_VERSION_CODE: "77"
        CM_VERSION_NAME: "1.3"

      android_signing:
        - sendo-key

    triggering:
      events:
        - push

      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps

      - name: Create dummy web assets
        script: |
          mkdir -p dist
          echo "<html><body>Sendo</body></html>" > dist/index.html

      - name: Sync Capacitor Android
        script: |
          npx cap sync android

      - name: Update Android version
        script: |
          cd android
          sed -i.bak "s/versionCode [0-9]*/versionCode $CM_VERSION_CODE/" app/build.gradle
          sed -i.bak 's/versionName "[^"]*"/versionName "'"$CM_VERSION_NAME"'"/' app/build.gradle

      - name: Inject signing config
        script: |
          cat >> android/app/build.gradle <<EOF

          android {
              signingConfigs {
                  release {
                      storeFile file(System.getenv("CM_KEYSTORE_PATH"))
                      storePassword System.getenv("CM_KEYSTORE_PASSWORD")
                      keyAlias System.getenv("CM_KEY_ALIAS")
                      keyPassword System.getenv("CM_KEY_PASSWORD")
                  }
              }

              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          EOF

      - name: Build Signed AAB
        script: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

    artifacts:
      - android/app/build/outputs/**/*.aab

  capacitor-ios:
    name: Build Sendo iOS IPA

    instance_type: mac_mini_m1
    max_build_duration: 60

    environment:
      node: latest
      xcode: latest

      vars:
        BUNDLE_ID: "app.sendo.delivery"

    integrations:
      app_store_connect: codemagic

    triggering:
      events:
        - push

      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps

      - name: Create dummy web assets
        script: |
          mkdir -p dist
          echo "<html><body>Sendo</body></html>" > dist/index.html

      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Initialize iOS Signing
        script: |
          xcode-project use-profiles

      - name: Build IPA (Native Xcodebuild)
        script: |
          # 1. Creamos el archivo de empaquetado (.xcarchive) inyectando tu Team ID a la fuerza
          xcodebuild -workspace "ios/App/App.xcworkspace" \
            -scheme "App" \
            -configuration "Release" \
            -archivePath "build/ios/xcarchive/App.xcarchive" \
            archive \
            DEVELOPMENT_TEAM="C4MF2U58VT" \
            CODE_SIGN_STYLE="Manual" \
            PROVISIONING_PROFILE_SPECIFIER="Sendo iOS Cert"

          # 2. Exportamos el archivo .xcarchive a un formato .ipa final listo para la App Store
          xcodebuild -exportArchive \
            -archivePath "build/ios/xcarchive/App.xcarchive" \
            -exportPath "build/ios/ipa" \
            -exportOptionsPlist "ios/App/App/ExportOptions.plist"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true